<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>K00 Sanitizer</title>
  </head>
  <body>
    <header class="brand">
      <span class="wordmark">K00.</span>
      <span class="brand-tag">// sanitizer</span>
    </header>

    <div class="block">
      <span class="block-label">Files sanitized</span>
      <span id="count" class="stat">0</span>
    </div>

    <div class="block">
      <span class="block-label">Current site</span>
      <span id="host" class="mono-value"></span>
    </div>

    <div class="setting">
      <div class="setting-text">
        <div class="setting-title">Sanitize on this site</div>
        <div class="setting-sub">Strips metadata from paste, drop and upload.</div>
      </div>
      <label class="switch">
        <input id="toggle" type="checkbox" />
        <span class="switch-track"><span class="switch-thumb"></span></span>
      </label>
    </div>

    <div id="status" class="status"></div>

    <div class="block formats">
      <span class="block-label">Supported formats</span>
      <span class="mono-value">JPG PNG WEBP GIF BMP PDF DOCX MP4 MP3</span>
    </div>

    <a class="ghost-button" href="https://k00.nl" target="_blank" rel="noreferrer">k00.nl</a>
    <script src="dist/popup.js"></script>
  </body>
</html>
