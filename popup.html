<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="popup.css" />
    <title>K00 Sanitizer</title>
  </head>
  <body>
    <header class="header">
      <img class="logo logo-light" src="icons/k00_logo_light.png" alt="K00" />
      <img class="logo logo-dark" src="icons/k00_logo_dark.png" alt="K00" />
    </header>

    <section class="card">
      <div class="metric">
        <div class="metric-label">Files sanitized</div>
        <div id="count" class="metric-value">0</div>
      </div>

      <div class="row">
        <div class="row-label">Current site</div>
        <div id="host" class="row-value"></div>
      </div>

      <div class="toggle-row">
        <label class="switch">
          <input id="toggle" type="checkbox" />
          <span class="slider"></span>
        </label>
        <div class="toggle-text">
          <div class="toggle-title">Sanitize on this site</div>
          <div class="toggle-sub">Strips metadata from paste, drop and upload.</div>
        </div>
      </div>

      <div id="status" class="status"></div>
    </section>

    <section class="card formats">
      <div class="formats-label">Supported formats</div>
      <div class="formats-list">JPG · PNG · WEBP · GIF · BMP · PDF · DOCX · MP4 · MP3</div>
    </section>

    <div class="forge-bar"></div>

    <a class="link" href="https://k00.nl" target="_blank" rel="noreferrer">k00.nl</a>
    <script src="dist/popup.js"></script>
  </body>
</html>
